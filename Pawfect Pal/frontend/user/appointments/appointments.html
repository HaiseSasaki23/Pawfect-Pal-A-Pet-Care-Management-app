<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0">
    <title>Pawfect Pal</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" 
          rel="stylesheet">
    <link rel="stylesheet" 
          href="style.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../sidebar/logo.png" 
                     alt="Pawfect Pal" 
                     class="sidebar-logo-landscape">
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <img src="../../sidebar/dashboard-m.png" class="custom-icon-nav"> 
                    Dashboard 
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="pets.html" class="nav-item">
                    <img src="../../sidebar/pets-m.png" class="custom-icon-nav"> 
                    Pets 
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="#" class="nav-item active">
                    <img src="../../sidebar/appointment-m.png" class="custom-icon-nav"> 
                    Appointments 
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="#" class="nav-item">
                    <img src="../../sidebar/health-m.png" class="custom-icon-nav"> 
                    Health Records
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="#" class="nav-item">
                    <img src="../../sidebar/services-m.png" class="custom-icon-nav"> 
                    Services 
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="#" class="nav-item">
                    <img src="../../sidebar/billing-m.png" class="custom-icon-nav"> 
                    Payment
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <strong class="user-name">
                        <span id="OwnerFName">Guest</span> <span id="OwnerLName">User</span>
                    </strong>
                    <span class="user-role">Pet Owner</span>
                </div>
                <a href="#" class="nav-item logout-item" onclick="triggerLogout()">
                    <img src="../../sidebar/logout-m.png" class="custom-icon-nav logout-icon" alt="Logout"> 
                    Logout 
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div class="browser-controls-unified">
                <div class="search-box">
                    <input type="text" 
                           id="appSearch" 
                           placeholder="Search appointments..." 
                           onkeyup="filterAppointments()">
                    <img src="user-appointments/search.png" 
                         class="search-icon-btn" 
                         alt="Search">
                </div>

                <div class="themed-select-wrapper mini-selec">
                    <select class="themed-filter-select" id="speciesFilter" onchange="filterAppointments()">
                        <option value="all">All Species</option>
                        <option value="Dog">Dog</option>
                        <option value="Cat">Cat</option>
                        <option value="Rabbit">Rabbit</option>
                        <option value="Bird">Bird</option>
                        <option value="Bird">Hamster</option>
                    </select>
                </div>

                <div class="themed-select-wrapper mini-selec">
                    <select class="themed-filter-select" id="statusSelect" onchange="filterAppointments()">
                        <option value="all">Select Status</option>
                        <option value="pending">Pending</option>
                        <option value="checked-in">Checked-in</option>
                        <option value="in-progress">In-progress</option>
                        <option value="completed">Completed</option>
                        <option value="no-show">No Show</option>
                    </select>
                </div>

                <div class="dropdown-check-container">
                    <div class="dropdown-check-trigger" onclick="toggleServiceDropdown()">
                        Services <span class="arrow-down">▼</span>
                    </div>
                    <div class="dropdown-check-content" id="serviceDropdown">
                        <label><input type="checkbox" class="service-filter-check" value="1" onchange="filterAppointments()"> Check-up</label>
                        <label><input type="checkbox" class="service-filter-check" value="2" onchange="filterAppointments()"> Vaccination</label>
                        <label><input type="checkbox" class="service-filter-check" value="3" onchange="filterAppointments()"> Deworming</label>
                        <label><input type="checkbox" class="service-filter-check" value="4" onchange="filterAppointments()"> Grooming</label>
                    </div>
                </div>

                <button type="button" class="clear-filters-btn" onclick="clearAllFilters()">
                    Clear
                </button>

                <button class="add-appointment-btn-unified" 
                        onclick="openModal('bookAppointmentModal')">
                    + New Appointment
                </button>
            </div>

            <div class="appointment-list-header">
                <span></span>
                <span>Pet Name</span>
                <span>Service</span>
                <span>Date & Time</span>
                <span>Status</span>
            </div>

            <div class="appointment-list" id="appointmentList"> 
                <div class="appointment-list" id="appointmentList"> 
                    </div>
        </main>
    </div>

    <div id="bookAppointmentModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header-unified">
            <h2 class="modal-title">Book an Appointment</h2>
            <button type="button" class="close-btn-themed" onclick="closeModal('bookAppointmentModal')">&times;</button>
        </div>
            <div class="modal-form-container">
            <form id="bookAppointmentForm" 
                  class="pet-form">
                <div class="input-group">
                    <label>Select Pet</label>
                    <select id="bookingPetName" name="PetID" required>
                        <option value="" disabled selected>Select Pet</option>
                        </select>
                </div>

                <div class="input-group">
                    <label>Date</label>
                    <input type="date" 
                           id="bookingDate" 
                           name="AppointmentDate" 
                           required>
                </div>
                <div class="input-group">
                    <label>Time Slot (07:00 AM - 05:00 PM)</label>
                    <select id="bookingTime" 
                            required>
                        <option value="" disabled selected>Select Time</option>
                        <option value="07:00">07:00 AM</option>
                        <option value="07:30">07:30 AM</option>
                        <option value="08:00">08:00 AM</option>
                        <option value="08:30">08:30 AM</option>
                        <option value="09:00">09:00 AM</option>
                        <option value="09:30">09:30 AM</option>
                        <option value="10:00">10:00 AM</option>
                        <option value="10:30">10:30 AM</option>
                        <option value="11:00">11:00 AM</option>
                        <option value="11:30">11:30 AM</option>
                        <option value="12:00">12:00 PM</option>
                        <option value="12:30">12:30 PM</option>
                        <option value="13:00">01:00 PM</option>
                        <option value="13:30">01:30 PM</option>
                        <option value="14:00">02:00 PM</option>
                        <option value="14:30">02:30 PM</option>
                        <option value="15:00">03:00 PM</option>
                        <option value="15:30">03:30 PM</option>
                        <option value="16:00">04:00 PM</option>
                        <option value="16:30">04:30 PM</option>
                        <option value="17:00">05:00 PM</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Services (₱ Estimate)</label>
                    <div class="beck-box">
                        <div class="beck-option">
                            <input type="checkbox" 
                                   id="s1" 
                                   name="services" 
                                   data-price="500" 
                                   value="checkup">
                            <label for="s1">Check-up <span>₱500</span></label>
                        </div>
                        <div class="beck-option">
                            <input type="checkbox" 
                                   id="s2" 
                                   name="services" 
                                   data-price="1200" 
                                   value="vaccination">
                            <label for="s2">Vaccination <span>₱1,200</span></label>
                        </div>
                        <div class="beck-option">
                            <input type="checkbox" 
                                   id="s3" 
                                   name="services" 
                                   data-price="350" 
                                   value="deworming">
                            <label for="s3">Deworming <span>₱350</span></label>
                        </div>
                        <div class="beck-option">
                            <input type="checkbox" 
                                   id="s4" 
                                   name="services" 
                                   data-price="1500" 
                                   value="grooming">
                            <label for="s4">Grooming <span>₱1,500</span></label>
                        </div>
                    </div>
                </div>
                <div class="input-group total-box purple-soft">
                    <p>Total Est:</p>
                    <h3 id="bookingTotal">₱0</h3>
                </div>
                <div class="input-group">
                    <label>Payment Mode</label>
                    <select id="bookingPayment" 
                            required 
                            onchange="toggleGcashDetails()">
                        <option value="" disabled selected>Select Payment</option>
                        <option value="Cash">Cash</option>
                        <option value="GCash">GCash</option>
                    </select>
                </div>
                <div id="gcashDetails" style="display: none;">
                    <div class="gcash-row"></div>
                        <div class="input-group">
                            <input type="text" id="gcashName" placeholder="GCash Name (Letters only)" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
                        </div>
                        <div class="input-group">
                            <input type="text" id="gcashRef" placeholder="Reference Number (13 Numbers only)"
                                    maxlength="13"oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        </div>
                </div>
                <button type="submit" 
                        class="register-btn">
                    Request Booking
                </button>
            </form>
        </div>
    </div>

    <div id="successToast" class="success-toast-overlay">
        <div class="success-toast-content">
            <div class="success-icon">✓</div>
            <h3>Request Sent!</h3>
            <p>Your appointment request has been sent successfully. Please wait for confirmation.</p>
            <button onclick="hideSuccessMessage()" class="submit-btn">Great!</button>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border: none;">
                <h2 style="color: var(--primary-purple); font-size: 20px;">Confirm Log out</h2>
            </div>
            <div class="modal-body">
                <p id="confirmMessage" style="margin-bottom: 25px; color: var(--text-dark);"></p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="btnConfirmDelete" class="submit-btn" style="margin: 0; background-color: #ff5e78; flex: 1;">Remove</button>
                    <button onclick="closeModal('confirmModal')" class="action-btn view-btn" style="flex: 1; border-radius: 12px; height: 48px;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../data/auth.js"></script>
    <script src="appointments.js"></script>
</body>
</html>
