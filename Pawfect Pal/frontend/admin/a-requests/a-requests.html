<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawfect Pal</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../sidebar/logo.png" alt="Pawfect Pal" class="sidebar-logo-landscape">
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <img src="../../sidebar/dashboard-m.png" class="custom-icon-nav"> 
                    Dashboard 
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="#" class="nav-item">
                    <img src="../../sidebar/pets-m.png" class="custom-icon-nav"> 
                    Pets 
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="#" class="nav-item">
                    <img src="../../sidebar/appointment-m.png" class="custom-icon-nav"> 
                    Appointments 
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="#" class="nav-item active">
                    <img src="../../sidebar/request-m.png" class="custom-icon-nav"> 
                    Requests
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="#" class="nav-item">
                    <img src="../../sidebar/health-m.png" class="custom-icon-nav"> 
                    Health Records
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
                <a href="#" class="nav-item">
                    <img src="../../sidebar/billing-m.png" class="custom-icon-nav"> 
                    Payments
                    <img src="../../sidebar/active.png" class="nav-char">
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <strong class="user-name">
                        <span id="UserName">User</span>
                    </strong>
                    <span class="user-role">Admin</span>
                </div>
                <a href="#" class="nav-item logout-item" onclick="triggerLogout()">
                    <img src="../../sidebar/logout-m.png" class="custom-icon-nav logout-icon" alt="Logout"> 
                    Logout 
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="requests-header">
                <div class="stats-container" style="display: flex; gap: 20px; margin-bottom: 30px;">
                    <div class="service-card purple-card" style="flex: 1; padding: 20px; height: 120px;">
                        <div class="card-icon-container" style="width: 60px; height: 60px;">
                            <img src="img-request/pending.png" alt="Pending" style="width: 50cm; height: 50cm; transform: scale(0.05);">
                        </div>
                        <div class="card-details">
                            <h3 id="pendingCount" style="margin: 0; font-size: 28px;">0</h3>
                            <p style="margin: 0;">Pending</p>
                        </div>
                    </div>

                    <div class="service-card green-card" style="flex: 1; padding: 20px; height: 120px;">
                        <div class="card-icon-container" style="width: 60px; height: 60px;">
                            <img src="img-request/approve.png" alt="Approved" style="width: 50cm; height: 50cm; transform: scale(0.05);">
                        </div>
                        <div class="card-details">
                            <h3 id="approvedCount" style="margin: 0; font-size: 28px;">0</h3>
                            <p style="margin: 0;">Approved</p>
                        </div>
                    </div>

                    <div class="service-card pink-card" style="flex: 1; padding: 20px; height: 120px;">
                        <div class="card-icon-container" style="width: 60px; height: 60px;">
                            <img src="img-request/decline.png" alt="Declined" style="width: 50cm; height: 50cm; transform: scale(0.05);">
                        </div>
                        <div class="card-details">
                            <h3 id="declineCount" style="margin: 0; font-size: 28px;">0</h3>
                            <p style="margin: 0;">Declined</p>
                        </div>
                    </div>

                    <div class="service-card orange-card" style="flex: 1; padding: 20px; height: 120px;">
                        <div class="card-icon-container" style="width: 60px; height: 60px;">
                             <img src="img-request/total-pets.png" alt="Total-Pets" style="width: 50cm; height: 50cm; transform: scale(0.05);">
                        </div>
                        <div class="card-details">
                            <h3 id="totalRequestCount" style="margin: 0; font-size: 28px;">0</h3>
                            <p style="margin: 0;">Total Requests</p>
                        </div>
                    </div>
                </div>
            </header>

            <section class="table-container" style="background: white; border-radius: 24px; padding: 25px; box-shadow: var(--card-shadow);">
                <div class="table-header-actions" style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <div class="filter-group" style="display: flex; gap: 15px; align-items: center;">
                            <select id="requestTypeFilter" class="modal-form" onchange="applyAllFilters(); toggleAppointmentFilters(this.value)">
                                <option value="all">All Requests</option>
                                <option value="pet">Pet Registration</option>
                                <option value="appointment">Appointments</option>
                            </select>

                            <div id="appointmentFilters" style="display: none; position: relative;">
                                <button type="button" id="serviceDropBtn" class="modal-form" style="width: 220px; text-align: left;">
                                    Services Availed (0)
                                </button>
                                <div id="serviceDropdown" style="display: none; position: absolute; top: 110%; left: 0; width: 250px; background: white; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); z-index: 1000; padding: 15px; border: 1px solid #e0d5f0;">
                                    <label style="display: flex; gap: 10px; padding: 8px 0; cursor: pointer;">
                                        <input type="checkbox" class="service-opt" value="Check-up"> Check-up
                                    </label>
                                    <label style="display: flex; gap: 10px; padding: 8px 0; cursor: pointer;">
                                        <input type="checkbox" class="service-opt" value="Vaccination"> Vaccination
                                    </label>
                                    <label style="display: flex; gap: 10px; padding: 8px 0; cursor: pointer;">
                                        <input type="checkbox" class="service-opt" value="Deworming"> Deworming
                                    </label>
                                    <label style="display: flex; gap: 10px; padding: 8px 0; cursor: pointer;">
                                        <input type="checkbox" class="service-opt" value="Grooming"> Grooming
                                    </label>
                                </div>
                            </div>

                            <select id="ownerFilter" class="modal-form" style="width: 180px; margin: 0;" onchange="applyAllFilters()">
                                <option value="">All Owners</option>
                            </select>
                        </div>
                        
                        <div class="search-wrapper">
                            <input type="text" id="requestSearchInput" placeholder="Search pet or owner..." class="modal-form" style="width: 320px;" onkeyup="applyAllFilters()">
                        </div>
                    </div>
                </div>

                <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid var(--bg-lavender);">
                            <th style="padding: 15px; color: var(--text-muted);">TYPE</th>
                            <th style="padding: 15px; color: var(--text-muted);">PET</th>
                            <th style="padding: 15px; color: var(--text-muted);">OWNER</th>
                            <th style="padding: 15px; color: var(--text-muted);">DATE</th>
                            <th style="padding: 15px; color: var(--text-muted);">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="requestTableBody">
                    </tbody>
                </table>
            </section>
        </main>

         <div id="mainModal" class="modal-overlay">
            <div class="modal-content wide-modal">
                    <div class="modal-header"><h2 id="modalTitle">Title</h2><button class="close-btn" onclick="closeModal('mainModal')">&times;</button></div>
                    <div class="modal-body" id="modalBody"></div>
                </div>
            </div>
        </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border: none;">
                <h2 style="color: var(--primary-purple); font-size: 20px;">Confirm Log out</h2>
            </div>
            <div class="modal-body">
                <p id="confirmMessage" style="margin-bottom: 25px; color: var(--text-dark);"></p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="btnConfirmDelete" class="submit-btn" style="margin: 0; background-color: #ff5e78; flex: 1;">Remove</button>
                    <button onclick="closeModal('confirmModal')" class="action-btn view-btn" style="flex: 1; border-radius: 12px; height: 48px;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="requestActionModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2 id="requestActionTitle">Confirm Action</h2>
                <button class="close-btn" onclick="closeModal('requestActionModal')">&times;</button>
            </div>
            <div class="modal-body" style="text-align: center;">
                <div id="actionIcon" style="font-size: 50px; margin-bottom: 15px;"></div>
                <p id="requestActionMessage" style="margin-bottom: 25px; line-height: 1.5; color: var(--text-dark);"></p>
                <div style="display: flex; gap: 12px;">
                    <button id="btnConfirmRequest" class="submit-btn" style="flex: 1;">Proceed</button>
                    <button onclick="closeModal('requestActionModal')" class="action-btn view-btn" style="flex: 1; border-radius: 12px;">Go Back</button>
                </div>
            </div>
        </div>
    </div>

    <script src="requests.js"></script>

</body>
</html>
