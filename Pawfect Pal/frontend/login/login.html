<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawfect Pal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="left-side">
            <div class="header-text">
                <h1>Pawfect Pal</h1>
        </div>
    
        <div class="image-wrapper">
            <img src="login-img/sit.png" alt="Pet Character" class="main-img" id="main-pet-img">
        </div>

        <div class="quote-box" id="speech-bubble">
            Paws-itively Organized Pet Care 
        </div>
    </div>

        <div class="right-side">
            <div class="login-box">
                <div class="welcome-text">
                    <h1>Welcome Back! </h1>
                    <p>Login to continue to Pawfect Pal </p>
                </div>

                <form class="actual-form" id="loginForm">
                    <div class="input-container">
                        <input type="text" id="userName" placeholder="Username or Email" required>
                    </div>

                    <div class="input-container password-wrapper">
                        <input type="password" id="password" placeholder="Password" required>

                        <input type="checkbox" id="toggle-check" style="display: none;">
    
                        <label for="toggle-check" class="toggle-label">
                            <img src="login-img/eye-closed.png" class="eye-icon closed" alt="Hide Password">
                            <img src="login-img/eye-open.png" class="eye-icon open" alt="Show Password">
                        </label>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Login</button>
                </form>

                <div class="signup-footer">
                    Don't have an account? <a href="../register/registration.html">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
