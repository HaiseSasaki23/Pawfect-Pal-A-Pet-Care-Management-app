<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawfect Pal</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Character peek-a-boo effect logic */
        .nav-char {
            width: 25px;
            height: 25px;
            margin-left: auto;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .nav-item.active .nav-char {
            width: 40px; 
            height: 40px; 
            opacity: 1;
            content: url('user-pets/active.png');
        }

        .sidebar:hover .nav-item.active .nav-char {
            opacity: 0;
        }

        .sidebar .nav-item:hover .nav-char {
            width: 45px; 
            height: 45px; 
            opacity: 1 !important;
            content: url('user-pets/peek.png') !important;
        }

        /* GUI Search Box Layout */
        .search-container {
            position: relative;
            flex: 2.5;
        }

        .search-box {
            display: flex;
            align-items: center;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 50px 12px 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            background: #fafafa;
            outline: none;
        }

        .search-icon-btn {
            position: absolute;
            right: 10px;
            width: 30px; 
            height: 30px; 
            cursor: pointer;
            object-fit: contain;
            transition: transform 0.2s;
            padding: 5px; 
        }

        .search-icon-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="user-pets/logo.png" alt="Pawfect Pal" class="sidebar-logo-landscape">
            </div>
            <nav class="sidebar-nav">
                <a href="../dashboard/dashboard.html" class="nav-item"><img src="user-pets/dashboard-m.png" class="custom-icon-nav"> Dashboard <img src="user-pets/active.png" class="nav-char"></a>
                <a href="#" class="nav-item active"><img src="user-pets/pets-m.png" class="custom-icon-nav"> Pets <img src="user-pets/active.png" class="nav-char"></a>
                <a href="#" class="nav-item"><img src="user-pets/appointment-m.png" class="custom-icon-nav"> Appointments <img src="user-pets/active.png" class="nav-char"></a>
                <a href="#" class="nav-item"><img src="user-pets/health-m.png" class="custom-icon-nav"> Health Records <img src="user-pets/active.png" class="nav-char"></a>
                <a href="#" class="nav-item"><img src="user-pets/services-m.png" class="custom-icon-nav"> Services <img src="user-pets/active.png" class="nav-char"></a>
                <a href="#" class="nav-item"><img src="user-pets/feeding-m.png" class="custom-icon-nav"> Feeding Schedule <img src="user-pets/active.png" class="nav-char"></a>
                <a href="#" class="nav-item"><img src="user-pets/reminders-m.png" class="custom-icon-nav"> Reminders <img src="user-pets/active.png" class="nav-char"></a>
                <a href="#" class="nav-item"><img src="user-pets/billing-m.png" class="custom-icon-nav"> Billing History <img src="user-pets/active.png" class="nav-char"></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info"><strong class="user-name"><span id="OwnerFName">Guest</span> User</strong><span class="user-role">Pet Owner</span></div>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header"></header>

            <section class="pets-browser-container">
                <div class="browser-controls">
                    <div class="search-container">
                        <div class="search-box">
                            <input type="text" id="petSearch" placeholder="Search pets..." onkeyup="handleFilter()">
                            <img src="user-pets/search.png" class="search-icon-btn" onclick="handleFilter()" alt="Search">
                        </div>
                    </div>
                    
                    <button class="add-pet-btn-inline" onclick="openActionModal('Add Pet')">+ Add New Pet</button>

                    <select class="species-filter" id="speciesFilter" onchange="handleFilter()">
                        <option value="All">All Species</option>
                        <option value="Dog">Dog</option>
                        <option value="Cat">Cat</option>
                        <option value="Rabbit">Rabbit</option>
                        <option value="Bird">Bird</option>
                        <option value="Hamster">Hamster</option>
                    </select>

                    <select class="species-filter" id="genderFilter" onchange="handleFilter()">
                        <option value="All">Genders</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>

                    <select class="species-filter" id="ageFilter" onchange="handleFilter()">
                        <option value="All">Ages</option>
                        <option value="0-1">0-1 yrs</option>
                        <option value="2-5">2-5 yrs</option>
                        <option value="6+">6+ yrs</option>
                    </select>

                    <button class="clear-btn" onclick="clearFilters()">Clear <span class="arrow-icon">›</span></button>
                </div>

                <div class="pets-grid" id="petsGrid"></div>
            </section>
        </main>
    </div>

    <div id="mainModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">Title</h2><button class="close-btn" onclick="closeModal('mainModal')">&times;</button></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border: none;">
                <h2 style="color: var(--primary-purple); font-size: 20px;">Confirm Removal</h2>
            </div>
            <div class="modal-body">
                <p id="confirmMessage" style="margin-bottom: 25px; color: var(--text-dark);"></p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="btnConfirmDelete" class="submit-btn" style="margin: 0; background-color: #ff5e78; flex: 1;">Remove</button>
                    <button onclick="closeModal('confirmModal')" class="action-btn view-btn" style="flex: 1; border-radius: 12px; height: 48px;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('mainModal');
        const confirmModal = document.getElementById('confirmModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const petsGrid = document.getElementById('petsGrid');

        let petToDelete = null;

        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

        function handleFilter() {
            const searchTerm = document.getElementById('petSearch').value.toLowerCase();
            const speciesSel = document.getElementById('speciesFilter').value;
            const genderSel = document.getElementById('genderFilter').value;
            const ageSel = document.getElementById('ageFilter').value;

            document.querySelectorAll('.pet-card').forEach(card => {
                const name = card.querySelector('h3').innerText.toLowerCase();
                const species = card.getAttribute('data-species');
                const gender = card.querySelector('.pet-gender').innerText.includes("Male") ? "Male" : "Female";
                const ageText = card.querySelector('p').innerText; 
                
                let ageInYears = 0;
                if (ageText.includes("months")) {
                    ageInYears = parseInt(ageText.match(/\d+/)[0]) / 12;
                } else {
                    ageInYears = parseInt(ageText.match(/\d+/)[0]);
                }

                let ageMatch = true;
                if (ageSel === "0-1") ageMatch = (ageInYears <= 1);
                else if (ageSel === "2-5") ageMatch = (ageInYears >= 2 && ageInYears <= 5);
                else if (ageSel === "6+") ageMatch = (ageInYears >= 6);

                const visible = name.includes(searchTerm) && 
                                (speciesSel === "All" || species === speciesSel) && 
                                (genderSel === "All" || gender === genderSel) && 
                                (ageSel === "All" || ageMatch);

                card.style.display = visible ? "block" : "none";
            });
        }

        function clearFilters() {
            document.getElementById('petSearch').value = "";
            document.getElementById('speciesFilter').value = "All";
            document.getElementById('genderFilter').value = "All";
            document.getElementById('ageFilter').value = "All";
            document.querySelectorAll('.pet-card').forEach(c => c.style.display = "block");
        }

        function calculateAge(birthDateString) {
            const birthday = new Date(birthDateString);
            const today = new Date();
            let years = today.getFullYear() - birthday.getFullYear();
            let months = today.getMonth() - birthday.getMonth();
            if (months < 0 || (months === 0 && today.getDate() < birthday.getDate())) {
                years--;
                months += 12;
            }
            const display = document.getElementsByName('AgeDisplay')[0];
            const hidden = document.getElementsByName('Age')[0];
            if (display) {
                if (years > 0) { display.value = `${years} yrs`; hidden.value = years; }
                else { display.value = `${months} months`; hidden.value = 0; }
            }
        }

        function validateInput(input) {
            const error = input.nextElementSibling;
            if (error && error.classList.contains('validation-error')) {
                error.style.display = (!input.checkValidity() && input.value !== "") ? 'block' : 'none';
                error.innerText = input.title;
            }
        }

        petsGrid.addEventListener('click', function(e) {
            const card = e.target.closest('.pet-card');
            if (!card) return;
            const id = card.getAttribute('data-id');
            const birthday = card.getAttribute('data-birthday');
            const name = card.querySelector('h3').innerText;
            const deetString = card.querySelector('p').innerText;
            const deets = deetString.split(' • ');

            if (e.target.classList.contains('view-btn')) {
                const imgSrc = card.querySelector('img').src;
                const genderRaw = card.querySelector('.pet-gender').innerText.replace('🐾 ', '');
                const dateObj = new Date(birthday);
                const formattedDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

                modalTitle.innerText = "Pet Profile: " + name;
                modalBody.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div style="display: flex; gap: 20px; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                            <img src="${imgSrc}" style="width: 80px; height: 80px; border-radius: 15px; object-fit: cover;">
                            <div><h3>${name}</h3><p style="color: #999; font-size: 13px;">ID: #PP-${id}</p></div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 14px;">
                            <div><strong style="color:var(--primary-purple)">Species:</strong><br>${deets[0]}</div>
                            <div><strong style="color:var(--primary-purple)">Breed:</strong><br>${deets[1]}</div>
                            <div><strong style="color:var(--primary-purple)">Birthday:</strong><br>${formattedDate}</div>
                            <div><strong style="color:var(--primary-purple)">Age:</strong><br>${deets[2]}</div>
                            <div><strong style="color:var(--primary-purple)">Gender:</strong><br>${genderRaw}</div>
                        </div>
                    </div>`;
                modal.style.display = 'flex';
            }
            if (e.target.classList.contains('edit-btn')) { openActionModal('Edit Pet', id); }
            if (e.target.classList.contains('delete-btn')) {
                petToDelete = card;
                document.getElementById('confirmMessage').innerText = `Remove ${name} (ID: ${id})?`;
                confirmModal.style.display = 'flex';
            }
        });

        document.getElementById('btnConfirmDelete').onclick = function() {
            if (petToDelete) {
                petToDelete.style.opacity = '0';
                setTimeout(() => petToDelete.remove(), 300);
                closeModal('confirmModal');
            }
        };

        function openActionModal(action, id = null) {
            modalTitle.innerText = action; 
            modal.style.display = 'flex';
            modalBody.innerHTML = `
                <form class="modal-form" id="petForm" novalidate>
                    <div class="image-upload-wrapper"><label>Pet Photo</label><input type="file" name="PetImage" accept="image/*"></div>
                    <input type="text" name="Name" placeholder="Pet Name" pattern="[A-Za-z\\s]+" title="Letters only." required oninput="validateInput(this)">
                    <div class="validation-error"></div>
                    <div class="date-group"><label>Birthday</label><input type="date" name="Birthday" onchange="calculateAge(this.value)" required></div>
                    <input type="text" name="AgeDisplay" placeholder="Age" readonly>
                    <input type="hidden" name="Age">
                    <div class="custom-select-wrapper">
                        <div class="select-box" onclick="toggleDrop('specDrop')"><span id="specText">Select Species</span></div>
                        <div id="specDrop" class="select-options">
                            <div class="opt" onclick="setVal('Dog', 'specText', 'specDrop')">Dog</div>
                            <div class="opt" onclick="setVal('Cat', 'specText', 'specDrop')">Cat</div>
                            <div class="opt" onclick="setVal('Rabbit', 'specText', 'specDrop')">Rabbit</div>
                            <div class="opt" onclick="setVal('Bird', 'specText', 'specDrop')">Bird</div>
                            <div class="opt" onclick="setVal('Hamster', 'specText', 'specDrop')">Hamster</div>
                            <div class="opt" onclick="setVal('Others', 'specText', 'specDrop')">Others</div>
                        </div>
                        <input type="hidden" name="Species" id="hidSpec">
                    </div>
                    <input type="text" id="otherSpec" style="display:none" placeholder="Specify Species" pattern="[A-Za-z\\s]+" title="Letters only." oninput="validateInput(this)">
                    <div class="validation-error"></div>
                    <input type="text" name="Breed" placeholder="Breed" pattern="[A-Za-z\\s]+" title="Letters only." oninput="validateInput(this)">
                    <div class="validation-error"></div>
                    <div class="custom-select-wrapper">
                        <div class="select-box" onclick="toggleDrop('genDrop')"><span id="genText">Gender</span></div>
                        <div id="genDrop" class="select-options">
                            <div class="opt" onclick="setVal('Male', 'genText', 'genDrop')">Male</div>
                            <div class="opt" onclick="setVal('Female', 'genText', 'genDrop')">Female</div>
                        </div>
                        <input type="hidden" name="Gender" id="hidGen">
                    </div>
                    <button type="submit" class="submit-btn">${action === 'Edit Pet' ? 'Update' : 'Register'}</button>
                </form>`;
        }

        function toggleDrop(id) { document.getElementById(id).classList.toggle('show'); }
        function setVal(val, textId, dropId) {
            document.getElementById(textId).innerText = val;
            document.getElementById(dropId).classList.remove('show');
            if(textId === 'specText') {
                document.getElementById('hidSpec').value = val;
                document.getElementById('otherSpec').style.display = (val === 'Others' ? 'block' : 'none');
            } else { document.getElementById('hidGen').value = val; }
        }
    </script>
</body>
</html>
